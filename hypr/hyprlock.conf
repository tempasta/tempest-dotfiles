general {
    hide_cursor = true
    fade_in = 0.05
    fade_out = 0.05
    ignore_empty_input = true
    fail_timeout = 1000
}

background {
    path = /home/tempest/Pictures/wallpapers/landscape-nature/default.jpg
    blur_passes = 3
    blur_size = 8
}

label {
    text = cmd[update:1000] echo "[ $(date +'%I:%M:%S %P') ]"
    font_size = 32
    color = rgba(c3c5c7aa)
    position = 0, 100
    halign = center
    valign = center
}

input-field {
    size = 300, 50
    position = 0, -80
    rounding = 0

    outer_color = rgb(6B707B)
    inner_color = rgba(0, 0, 0, 0.3)

    font_color = rgb(c3c5c7)
    font_family = JetBrainsMono Nerd Font

    outline_thickness = 1

    halign = center
    valign = center
}
