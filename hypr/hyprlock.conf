general {
    hide_cursor = true
    fade_in = 0.05
    fade_out = 0.05
    ignore_empty_input = true
    fail_timeout = 1000
}

background {
    path = $HOME/Pictures/wallpapers/Buildings.png
    blur_passes = 3
    blur_size = 8
}

label {
    text = cmd[update:1000] echo "[ $(date +'%I:%M:%S %P') ]"
    font_size = 32
    color = rgba(A15E69aa)
    position = 0, 100
    halign = center
    valign = center
}

input-field {
    size = 300, 50
    position = 0, -80
    rounding = 0

    outer_color = rgb(A15E69)
    inner_color = rgba(0, 0, 0, 0.3)

    font_color = rgb(c6c6c8)
    font_family = Noto Sans Mono

    outline_thickness = 1

    halign = center
    valign = center
}
